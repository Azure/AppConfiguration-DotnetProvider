# Azure DevOps pipeline for AppConfiguration-DotnetProvider.
#
# Replaces the GitHub Actions workflow in .github/workflows/ci.yml.
# Per GitHub inside Microsoft (GiM) guidance (https://aka.ms/gim/pipelines),
# production repos run CI in Azure Pipelines with 1ES Pipeline Templates for
# compliance. Integration tests authenticate to Azure through an Azure Resource
# Manager service connection instead of the GitHub -> Azure OIDC login, which is
# being phased out for the corp tenant.
#
# Reuse the SAME ARM service connection the existing OOBReleases OneBranch
# pipeline already uses to build and test this repo - its identity already has
# access to the integration-test resources, so no new service connection or
# RBAC setup is needed. Create this CI pipeline in the same ADO project so the
# connection is available.
#
# The 1ES Official template runs CodeQL/SDL automatically during the build, so
# no manual CodeQL tasks are required.
#
# ---------------------------------------------------------------------------
# TODO before first run - set the values below:
#   * azureServiceConnection : name of the shared ARM service connection.
#   * pool.name / pool.image : your 1ES-managed Windows pool and image.
# ---------------------------------------------------------------------------

trigger:
  branches:
    include:
      - main
      - preview
      - release/*
      - zhiyuanliang/ci   # TEMP: remove before merging - lets pushes to this branch run CI

pr:
  branches:
    include:
      - main
      - preview
      - release/*

resources:
  repositories:
    - repository: 1ESPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

variables:
  # ARM service connection used to authenticate the integration tests. Use the
  # same connection the OOBReleases OneBranch pipeline uses for this repo - its
  # identity already has access to the integration-test resources. Replaces the
  # GitHub OIDC azure/login@v1 step.
  azureServiceConnection: '<shared-arm-service-connection>'

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: '<your-1ES-windows-pool>'
      image: '<your-1ES-windows-image>'
      os: windows
    sdl:
      # The 1ES Official template runs SDL, including CodeQL, automatically.
      # This block is explicit for clarity and can be tuned or removed.
      codeql:
        compiled:
          enabled: true
    stages:
      - stage: Build
        jobs:
          - job: Build
            displayName: 'Build and Test'
            steps:
              - checkout: self

              - pwsh: build/install-dotnet.ps1 -RestoreOnly
                displayName: 'Install .NET'

              - pwsh: ./build.ps1 -RestoreOnly
                displayName: 'Restore'

              - pwsh: ./build.ps1
                displayName: 'Dotnet Build'

              - pwsh: ./pack.ps1
                displayName: 'Dotnet Pack'

              # Runs the tests inside the AzureCLI task, which logs "az" in via the
              # service connection. The AZURESUBSCRIPTION_* variables the task exposes
              # are mapped to the AZURE_* variables that DefaultAzureCredential reads
              # (EnvironmentCredential) - the same approach as the OOBReleases pipeline.
              - task: AzureCLI@2
                displayName: 'Dotnet Test'
                inputs:
                  azureSubscription: '$(azureServiceConnection)'
                  scriptType: 'pscore'
                  scriptLocation: 'inlineScript'
                  workingDirectory: '$(Build.SourcesDirectory)'
                  inlineScript: |
                    $env:AZURE_TENANT_ID = $env:AZURESUBSCRIPTION_TENANT_ID
                    $env:AZURE_CLIENT_ID = $env:AZURESUBSCRIPTION_CLIENT_ID
                    $env:AZURE_CLIENT_SECRET = $env:AZURESUBSCRIPTION_CLIENT_SECRET
                    $env:AZURE_SUBSCRIPTION_ID = (az account show --query id -o tsv)
                    ./test.ps1

              - task: PublishTestResults@2
                displayName: 'Publish Test Results'
                condition: succeededOrFailed()
                inputs:
                  testResultsFormat: 'VSTest'
                  testResultsFiles: '**/*.trx'
                  searchFolder: '$(Build.SourcesDirectory)/tests'
                  testRunTitle: 'Unit Test Results'
                  mergeTestResults: true
